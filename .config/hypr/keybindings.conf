###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mod = SUPER # SUPER / Windows key

# See https://wiki.hypr.land/Configuring/Binds/
bind = $mod,       COMMA,  exec, dms ipc call settings focusOrToggle
bind = $mod,       RETURN, exec, $terminal
bind = $mod,       SLASH,  exec, dms ipc call notepad toggle
bind = $mod,       SPACE,  exec, dms ipc call spotlight toggle
bind = $mod,       B,      exec, $terminal --title=btm --confirm-close-surface=false -e btm
bind = $mod,       M,      exec, dms ipc call processlist focusOrToggle
bind = $mod,       N,      exec, dms ipc call notifications toggle
bind = $mod,       O,      exec, $fileManager
bind = $mod SHIFT, P,      exec, dms ipc call powermenu toggle
bind = $mod,       V,      exec, dms ipc call clipboard toggle
bind = $mod,       W,      exec, dms ipc call lock lock

bind = $mod,       Q, killactive,
bind = $mod,       D, togglefloating,
bind = $mod,       F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0
bind = $mod,       P, pseudo,                # dwindle
bind = $mod,       I, layoutmsg, togglesplit # dwindle


# color picker & screenshot keybindings.
bind = $mod,       C,     exec, dms color pick --autocopy
bind = ,           PRINT, exec, dms screenshot
bind = $mod,       PRINT, exec, dms screenshot window
bind = $mod SHIFT, PRINT, exec, dms screenshot full

# Move focus with mod + arrow keys
bind = $mod, LEFT,  movefocus, l
bind = $mod, RIGHT, movefocus, r
bind = $mod, UP,    movefocus, u
bind = $mod, DOWN,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

bind = SUPER, TAB, cyclenext,        # change focus to another window
bind = SUPER, TAB, bringactivetotop, # bring it to the top

bind = $mod SHIFT, LEFT,  movewindow, l
bind = $mod SHIFT, RIGHT, movewindow, r
bind = $mod SHIFT, UP,    movewindow, u
bind = $mod SHIFT, DOWN,  movewindow, d
bind = $mod SHIFT, H,     swapwindow, l
bind = $mod SHIFT, L,     swapwindow, r
bind = $mod SHIFT, K,     swapwindow, u
bind = $mod SHIFT, J,     swapwindow, d

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace,        special:magic

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

bind = $mod ALT, RIGHT, workspace, e+1
bind = $mod ALT, LEFT,  workspace, e-1
bind = $mod ALT, L,     workspace, e+1
bind = $mod ALT, H,     workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Laptop multimedia keys for volume.
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 5
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 5
bindl  = , XF86AudioMute,        exec, dms ipc call audio mute
bindl  = , XF86AudioMicMute,     exec, dms ipc call audio micmute

# Music controls, requires playerctl.
bindl = , XF86AudioPlay,  exec, dms ipc call mpris playPause
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = , XF86AudioPrev,  exec, dms ipc call mpris previous
bindl = , XF86AudioNext,  exec, dms ipc call mpris next

# Laptop multimedia keys for LCD brightness.
bindel = , XF86MonBrightnessUp,   exec, dms ipc call brightness increment 5
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5

# Special keys of apps.
bind  = , XF86Calculator, exec, gnome-calculator
bind  = , XF86Explorer,   exec, $fileManager
bindo = , XF86HomePage,   exec, brave
bind  = , XF86Mail,       exec, thunderbird
